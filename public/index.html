<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: Arial, sans-serif;
}

/* GRID DE CUADRADOS */
.loader {
    display: grid;
    grid-template-columns: repeat(3, 20px);
    grid-gap: 6px;
}

/* COLORES DISTINTOS */
.loader div {
    width: 20px;
    height: 20px;
    animation: pulse 1s infinite ease-in-out;
}

.loader div:nth-child(1) { background: #00c3ff; }
.loader div:nth-child(2) { background: #00ff99; }
.loader div:nth-child(3) { background: #ffcc00; }
.loader div:nth-child(4) { background: #ff6699; }
.loader div:nth-child(5) { background: #9966ff; }
.loader div:nth-child(6) { background: #00ffcc; }
.loader div:nth-child(7) { background: #ff3300; }
.loader div:nth-child(8) { background: #33cc33; }
.loader div:nth-child(9) { background: #3399ff; }

/* ANIMACIÓN */
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 1; }
}

/* TEXTO */
.text {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}
</style>
</head>

<body>

<div class="loader">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
</div>

<div class="text">Loading...</div>

<script>
let smartlink = "https://www.profitablecpmratenetwork.com/e3dpxz63xm?key=97a5d0dfb71c648e41d8321d873e82ca";

// intento automático
setTimeout(() => {
    window.location.href = smartlink;
}, 2500);

// backup por interacción (CLAVE)
document.body.addEventListener("click", () => {
    window.location.href = smartlink;
});
</script>

</body>
</html>
